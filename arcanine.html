<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KANTO TCG — Loading…</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Type tag colours */
  .tt-normal   { color:#b8b8a8; border-color:#b8b8a8; background:rgba(184,184,168,.12); }
  .tt-fire     { color:#f08030; border-color:#f08030; background:rgba(240,128,48,.12); }
  .tt-water    { color:#6890f0; border-color:#6890f0; background:rgba(104,144,240,.12); }
  .tt-grass    { color:#78c850; border-color:#78c850; background:rgba(120,200,80,.12); }
  .tt-electric { color:#f8d030; border-color:#f8d030; background:rgba(248,208,48,.12); }
  .tt-ice      { color:#98d8d8; border-color:#98d8d8; background:rgba(152,216,216,.12); }
  .tt-fighting { color:#c03028; border-color:#c03028; background:rgba(192,48,40,.12); }
  .tt-poison   { color:#a040a0; border-color:#a040a0; background:rgba(160,64,160,.12); }
  .tt-ground   { color:#e0c068; border-color:#e0c068; background:rgba(224,192,104,.12); }
  .tt-flying   { color:#a890f0; border-color:#a890f0; background:rgba(168,144,240,.12); }
  .tt-psychic  { color:#f85888; border-color:#f85888; background:rgba(248,88,136,.12); }
  .tt-bug      { color:#a8b820; border-color:#a8b820; background:rgba(168,184,32,.12); }
  .tt-rock     { color:#b8a038; border-color:#b8a038; background:rgba(184,160,56,.12); }
  .tt-ghost    { color:#705898; border-color:#705898; background:rgba(112,88,152,.12); }
  .tt-dragon   { color:#7038f8; border-color:#7038f8; background:rgba(112,56,248,.12); }
  .type-tag { font-family:var(--pixel);font-size:6px;padding:2px 6px;border:2px solid;display:inline-block;letter-spacing:.3px; }

  /* ── HERO ── */
  .poke-hero {
    position: relative; overflow: hidden;
    padding: 48px 32px 40px; border-bottom: 4px solid var(--border2);
    background: var(--gb3);
  }
  .poke-hero::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image: linear-gradient(var(--border) 1px,transparent 1px), linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size: 16px 16px; opacity: 0.25;
  }
  .poke-hero-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 36px; position: relative; }
  .poke-hero-sprite { flex-shrink: 0; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }
  .poke-hero-sprite img {
    width: 100%; height: 100%; object-fit: contain;
    image-rendering: -webkit-optimize-contrast;
    filter: drop-shadow(4px 4px 0 var(--gb2));
    animation: bounce 2s steps(4) infinite;
  }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .poke-hero-text { flex: 1; }
  .hero-eyebrow { font-family: var(--pixel); font-size: 7px; color: var(--gb1); margin-bottom: 10px; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
  .hero-eyebrow::before { content: '▶'; color: var(--gb0); }
  .hero-type-row { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
  .poke-hero h1 { font-family: var(--pixel); font-size: clamp(16px, 4vw, 32px); color: var(--gb0); line-height: 1.6; letter-spacing: 2px; margin-bottom: 10px; text-shadow: 2px 2px 0 var(--gb3); }
  .poke-hero-desc { font-family: var(--vt); font-size: 20px; color: var(--gb1); max-width: 480px; margin-bottom: 20px; line-height: 1.5; }
  .hero-stats-row { display: flex; gap: 20px; flex-wrap: wrap; }
  .hstat { border: 2px solid var(--border); padding: 8px 12px; background: var(--surface); }
  .hstat-val { font-family: var(--pixel); font-size: 12px; color: var(--gb0); line-height: 1; margin-bottom: 4px; }
  .hstat-label { font-family: var(--pixel); font-size: 6px; color: var(--text-dim); letter-spacing: 0.5px; text-transform: uppercase; }
  .dex-bg { font-family: var(--pixel); font-size: clamp(60px, 12vw, 120px); color: rgba(155,188,15,.04); line-height: 1; letter-spacing: -2px; user-select: none; white-space: nowrap; flex-shrink: 0; }

  /* ── CONTROLS ── */
  .page-controls { position: sticky; top: 52px; z-index: 99; background: var(--gb3); border-bottom: 3px solid var(--border2); padding: 0 32px; }
  .page-controls-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; overflow-x: auto; scrollbar-width: none; }
  .page-controls-inner::-webkit-scrollbar { display: none; }
  .era-tab { padding: 12px 14px; font-family: var(--pixel); font-size: 7px; color: var(--text-dim); border: none; background: none; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; transition: color 0.1s, border-color 0.1s; letter-spacing: 0.3px; }
  .era-tab:hover { color: var(--text); }
  .era-tab.active { color: var(--gb0); border-bottom-color: var(--gb0); }
  .ctrl-right { margin-left: auto; display: flex; align-items: center; gap: 10px; padding: 8px 0 8px 16px; flex-shrink: 0; }
  .count-chip { font-family: var(--pixel); font-size: 6px; color: var(--text-dim); white-space: nowrap; }
  select.ctrl-select { background: var(--surface2); border: 2px solid var(--border2); color: var(--text); font-family: var(--pixel); font-size: 6px; padding: 5px 8px; cursor: pointer; letter-spacing: 0.3px; outline: none; }

  main { max-width: 1200px; margin: 0 auto; padding: 36px 32px 72px; }

  @media (max-width: 700px) {
    .poke-hero { padding: 36px 16px 28px; }
    .poke-hero-inner { flex-direction: column; gap: 20px; }
    .poke-hero-sprite { width: 120px; height: 120px; }
    .dex-bg { display: none; }
    main { padding: 24px 16px 48px; }
    .page-controls { padding: 0 12px; }
  }
</style>
</head>

<script src="data.js"></script>
<script>
'use strict';

/* ── NOTABLE metadata ── keyed by TCG API card id */
const NOTABLE = {
  /* CHARIZARD */
  'base1-4':    {notable:true,rarity:10,note:'THE most iconic Pokémon card ever. Base Set holo. Grail of the hobby.'},
  'base2-4':    {notable:true,rarity:10,note:'Base Set 2 reprint. Same art, slightly different border.'},
  'base4-3':    {notable:true,rarity:9, note:'Team Rocket (Dark Charizard) — evil variant of the legend.'},
  'swsh35-74':  {notable:true,rarity:10,note:'Champions Path full art — one of the most valuable modern Charizard cards.'},
  'swsh9-79':   {notable:true,rarity:10,note:'Brilliant Stars — Charizard Trainer Gallery.'},
  /* BLASTOISE */
  'base1-2':    {notable:true,rarity:10,note:'Base Set #2 holo. The iconic Water Gun art. Classic grail.'},
  'base2-2':    {notable:true,rarity:9, note:'Base Set 2 reprint.'},
  /* VENUSAUR */
  'base1-15':   {notable:true,rarity:9, note:'Base Set holo. The underrated starter — stunning art.'},
  /* MEWTWO */
  'base1-10':   {notable:true,rarity:10,note:'Base Set Mewtwo — the most powerful Pokémon\'s debut.'},
  'xy12-61':    {notable:true,rarity:10,note:'Mewtwo-EX — Full Art from BREAKthrough.'},
  /* PIKACHU */
  'base1-58':   {notable:true,rarity:8, note:'Original Base Set Pikachu — the Yellow Cheeks variant.'},
  'pgo-34':     {notable:true,rarity:8, note:'Radiant Pikachu — fan-favourite modern art.'},
  /* GENGAR */
  'base1-5':    {notable:true,rarity:9, note:'Base Set Gengar holo. One of the fan-favourite cards.'},
  /* GYARADOS */
  'base1-6':    {notable:true,rarity:9, note:'Base Set Gyarados holo. Dramatic art by Ken Sugimori.'},
  /* ALAKAZAM */
  'base1-1':    {notable:true,rarity:8, note:'Base Set #1 — Alakazam. First card in the set alphabetically.'},
  /* DRAGONITE */
  'base1-4':    {notable:true,rarity:8, note:'Fossil Dragonite.'},
  /* MOLTRES / ZAPDOS / ARTICUNO */
  'base1-9':    {notable:true,rarity:8, note:'Base Set Magneton.'},
};

/* ── ERA MAPPING ── */
function getEra(card) {
  const series = (card.set?.series||'').toLowerCase();
  const sid    = (card.set?.id||'').toLowerCase();
  if (['base','gym','neo','ecard'].includes(series)) return 'WotC';
  if (series==='ex'||sid.startsWith('ex')||sid.startsWith('np')) return 'EX';
  if (['dp','platinum','hgss'].includes(series)||sid.startsWith('dp')||sid.startsWith('pl')||sid.startsWith('hgss')||sid.startsWith('col')) return 'DP';
  if (series==='bw'||sid.startsWith('bw')) return 'BW';
  if (series==='xy'||sid.startsWith('xy')) return 'XY';
  if (series==='sm'||sid.startsWith('sm')||sid.startsWith('smp')) return 'SM';
  if (series==='swsh'||sid.startsWith('swsh')||sid.startsWith('shf')||sid.startsWith('cel')||sid.startsWith('pgo')) return 'SWSH';
  if (series==='sv'||sid.startsWith('sv')||sid.startsWith('meg')) return 'SV';
  return 'Other';
}
const ERA_ORDER  = ['WotC','EX','DP','BW','XY','SM','SWSH','SV','Other'];
const ERA_LABELS = {WotC:'WOTC / NEO ERA — 1999 TO 2003',EX:'EX ERA — 2003 TO 2007',DP:'DIAMOND & PEARL / PLATINUM — 2007 TO 2010',BW:'BLACK & WHITE — 2011 TO 2013',XY:'XY — 2013 TO 2016',SM:'SUN & MOON — 2017 TO 2019',SWSH:'SWORD & SHIELD — 2020 TO 2023',SV:'SCARLET & VIOLET — 2023 TO PRESENT',Other:'OTHER / PROMO'};

/* ── RARITY RANK ── */
const RARITY_RANK={'Special Illustration Rare':10,'Hyper Rare':10,'Rainbow Rare':10,'Illustration Rare':9,'Ultra Rare':9,'Secret Rare':9,'Full Art':9,'Amazing Rare':8,'Shiny Ultra Rare':9,'Double Rare':7,'Rare Holo VMAX':8,'Rare Holo VSTAR':8,'Rare Holo V':7,'Rare Holo GX':7,'Rare Holo EX':8,'Rare Holo LV.X':8,'Rare BREAK':7,'Rare Holo':6,'Rare Holo ex':7,'Rare':5,'Classic Collection':7,'Shiny Rare':8,'Uncommon':3,'Common':2,'Promo':4};
function rarityRank(card){const m=NOTABLE[card.id];if(m?.rarity)return m.rarity;return RARITY_RANK[card.rarity]??3;}

/* ── BADGES ── */
function badgesFor(card){
  const r=card.rarity||'',subs=card.subtypes||[],bs=[];
  if(subs.includes('TAG TEAM'))bs.push(['b-ex','TAG TEAM GX']);
  else if(subs.includes('VMAX'))bs.push(['b-ultra','VMAX']);
  else if(subs.includes('VSTAR'))bs.push(['b-ultra','VSTAR']);
  else if(subs.includes('V')&&!subs.includes('GX'))bs.push(['b-ex','V']);
  else if(subs.includes('GX'))bs.push(['b-ex','GX']);
  else if((subs.includes('EX')||subs.includes('ex'))&&card.set?.series!=='EX')bs.push(['b-ex','ex']);
  else if(subs.includes('EX'))bs.push(['b-ex','EX']);
  else if(card.name?.toLowerCase().includes('mega')&&!bs.length)bs.push(['b-ex','MEGA EX']);
  if(r.includes('Special Illustration'))bs.push(['b-ultra','SPEC ART RARE']);
  else if(r.includes('Illustration Rare'))bs.push(['b-ultra','ILLUS RARE']);
  else if(r==='Ultra Rare'||r==='Full Art')bs.push(['b-ultra','FULL ART']);
  else if(r.includes('Hyper')||r.includes('Rainbow'))bs.push(['b-sr','RAINBOW']);
  else if(r.includes('Secret'))bs.push(['b-sr','SECRET RARE']);
  else if(r.includes('Amazing'))bs.push(['b-rare','AMAZING RARE']);
  else if(r==='Double Rare')bs.push(['b-rare','DOUBLE RARE']);
  else if(r.includes('BREAK'))bs.push(['b-ultra','BREAK']);
  else if(r.includes('LV.X'))bs.push(['b-ultra','LV.X']);
  else if(r.includes('Rare Holo')||r==='Holo Rare')bs.push(['b-holo','HOLO RARE']);
  else if(r==='Promo')bs.push(['b-promo','PROMO']);
  else if(r==='Rare')bs.push(['b-rare','RARE']);
  else if(r==='Uncommon')bs.push(['b-common','UNCOMMON']);
  else if(r==='Common')bs.push(['b-common','COMMON']);
  if(!bs.length)bs.push(['b-common',r||'CARD']);
  return bs;
}

/* ── PRICE ── */
function getPriceVal(c){const p=c.tcgplayer?.prices;if(!p)return null;return p.holofoil?.market??p.normal?.market??p.reverseHolofoil?.market??p['1stEditionHolofoil']?.market??p.unlimitedHolofoil?.market??null;}
function getPrice(c){const v=getPriceVal(c);return v!=null?`$${v.toFixed(2)}`:null;}

/* ── LINKS ── */
function buildLinks(c){
  const buy=c.tcgplayer?.url||`https://www.tcgplayer.com/search/pokemon/product?q=${encodeURIComponent((c.name||'')+' '+(c.number||''))}`;
  const psa=`https://www.psacard.com/pop/search/results?query=${encodeURIComponent((c.name||'')+' '+(c.set?.name||''))}`;
  const ebay=`https://www.ebay.ca/sch/i.html?_nkw=${encodeURIComponent((c.name||'')+' '+(c.number||'')+' pokemon card')}&LH_Sold=1&LH_Complete=1`;
  const pc=`https://www.pricecharting.com/search-products?q=${encodeURIComponent((c.name||'')+' '+(c.set?.name||''))}&type=price-guide`;
  return{buy,psa,ebay,pc};
}

/* ── STATE ── */
let ALL_CARDS=[],activeEra='all',currentSlug='arcanine',currentPoke=null;
const cardStore={};

/* ── FILE CHECK ── */
function isFile(){ return window.location.protocol==='file:'; }

function showFileError(){
  document.getElementById('card-area').innerHTML=`
    <div style="border:3px solid var(--gold);padding:28px;max-width:560px;margin:0 auto;background:var(--surface);box-shadow:4px 4px 0 var(--gb3);">
      <div style="font-family:var(--pixel);font-size:9px;color:var(--gold);margin-bottom:12px;letter-spacing:.5px;">⚠ SERVER REQUIRED</div>
      <div style="font-family:var(--vt);font-size:18px;color:var(--text-dim);line-height:1.6;margin-bottom:16px;">
        Cards can't load when opened as a file://. You need a local server.
      </div>
      <div style="background:var(--gb3);padding:12px;font-family:var(--pixel);font-size:7px;color:var(--gb1);line-height:2;letter-spacing:.3px;">
        WINDOWS: double-click START-WINDOWS.bat<br>
        MAC: double-click START-MAC-LINUX.sh<br>
        THEN OPEN: http://localhost:8080
      </div>
    </div>`;
  document.getElementById('count-chip').textContent='— CARDS';
}

/* ── FETCH ── */
async function fetchAllCards(name){
  if(isFile()){ showFileError(); buildBuySection(); return; }
  document.getElementById('card-area').innerHTML=`<div class="status-block"><div class="spinner"></div><br>LOADING ${name.toUpperCase()} CARDS...</div>`;
  let cards=[];
  try{
    const enc=encodeURIComponent(`name:"${name}"`);
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),12000);
    const r1=await fetch(`https://api.pokemontcg.io/v2/cards?q=${enc}&pageSize=250&page=1`,{signal:ctrl.signal});
    clearTimeout(t);
    if(!r1.ok)throw new Error(r1.status);
    const j1=await r1.json();
    cards=j1.data||[];
    const total=j1.totalCount||cards.length;
    if(total>250){
      const pages=Math.ceil(total/250);
      for(let p=2;p<=pages;p++){
        const rp=await fetch(`https://api.pokemontcg.io/v2/cards?q=${enc}&pageSize=250&page=${p}`);
        const jp=await rp.json();cards=cards.concat(jp.data||[]);
      }
    }
  }catch(e){
    console.warn('API error:',e);
    if(!cards.length){
      document.getElementById('card-area').innerHTML=`<div class="status-block">CONNECTION ERROR.<br>CHECK YOUR INTERNET AND RELOAD.</div>`;
      buildBuySection();return;
    }
  }
  ALL_CARDS=cards;
  const hc=document.getElementById('hero-count');if(hc)hc.textContent=cards.length;
  renderCards();
  buildBuySection();
}

/* ── RENDER ── */
function renderCards(){
  const sort=document.querySelector('.ctrl-select').value;
  let list=activeEra==='all'?[...ALL_CARDS]:ALL_CARDS.filter(c=>getEra(c)===activeEra);
  const flat=sort.startsWith('price')||sort.startsWith('rarity');
  if(sort==='year-asc')list.sort((a,b)=>(a.set?.releaseDate||'').localeCompare(b.set?.releaseDate||'')||(a.number||'').localeCompare(b.number||''));
  else if(sort==='year-desc')list.sort((a,b)=>(b.set?.releaseDate||'').localeCompare(a.set?.releaseDate||'')||(a.number||'').localeCompare(b.number||''));
  else if(sort==='name')list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='price-desc')list.sort((a,b)=>(getPriceVal(b)??-1)-(getPriceVal(a)??-1));
  else if(sort==='price-asc')list.sort((a,b)=>(getPriceVal(a)??Infinity)-(getPriceVal(b)??Infinity));
  else if(sort==='rarity-desc')list.sort((a,b)=>rarityRank(b)-rarityRank(a));
  else if(sort==='rarity-asc')list.sort((a,b)=>rarityRank(a)-rarityRank(b));
  document.getElementById('count-chip').textContent=`${list.length} CARD${list.length!==1?'S':''}`;
  if(!list.length){document.getElementById('card-area').innerHTML=`<div class="status-block">NO CARDS IN THIS ERA.</div>`;return;}
  let html='';
  if(flat){
    const lbl={'price-desc':'SORTED BY PRICE — HIGHEST FIRST','price-asc':'SORTED BY PRICE — LOWEST FIRST','rarity-desc':'SORTED BY RARITY — RAREST FIRST','rarity-asc':'SORTED BY RARITY — MOST COMMON FIRST'}[sort]||'';
    html+=`<section class="era-section"><div class="era-label">${lbl}</div><div class="card-grid">`;
    list.forEach((c,i)=>{html+=cardHTML(c,i);});html+='</div></section>';
  }else{
    const byEra={};ERA_ORDER.forEach(e=>byEra[e]=[]);
    list.forEach(c=>{const e=getEra(c);if(byEra[e])byEra[e].push(c);});
    let idx=0;
    ERA_ORDER.forEach(era=>{
      if(!byEra[era]?.length)return;
      html+=`<section class="era-section"><div class="era-label">${ERA_LABELS[era]||era}</div><div class="card-grid">`;
      byEra[era].forEach(c=>{html+=cardHTML(c,idx);idx++;});html+='</div></section>';
    });
  }
  document.getElementById('card-area').innerHTML=html;
}

function cardHTML(card,idx){
  const meta=NOTABLE[card.id]||{},notable=meta.notable||false,note=meta.note||'';
  const img=card.images?.small||'',price=getPrice(card);
  const badges=badgesFor(card).map(([c,l])=>`<span class="badge ${c}">${l}</span>`).join('');
  const {buy,psa,ebay}=buildLinks(card);
  const sid=(card.id||'').replace(/[^a-zA-Z0-9]/g,'_');
  const delay=Math.min(idx*20,500);
  const stars='★'.repeat(Math.min(Math.ceil(rarityRank(card)/2),5));
  const yr=(card.set?.releaseDate||'').slice(0,4);
  cardStore[sid]=card;
  return`<div class="pcard${notable?' notable':''}" style="animation-delay:${delay}ms" onclick="openModal('${sid}')">
    <div class="pcard-img-wrap">
      ${img?`<img src="${img}" alt="${card.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:``}
      <div class="img-placeholder"${img?' style="display:none"':''}>?</div>
      ${notable?'<div class="notable-ribbon">★ NOTABLE</div>':''}
      <div class="year-tag">${yr}</div>
    </div>
    <div class="pcard-body">
      <div class="pcard-name">${card.name.toUpperCase()}</div>
      <div class="pcard-set">${card.set?.name||''} · ${card.number||''}</div>
      <div class="pcard-badges">${badges}</div>
      ${note?`<div class="pcard-note">${note}</div>`:'<div class="pcard-note"></div>'}
      <div class="pcard-price-row">
        ${price?`<span class="price-val">${price}</span><span class="price-label">MARKET</span>`:`<span class="price-none">NO PRICE</span>`}
        <span style="margin-left:auto;font-family:var(--pixel);font-size:8px;color:var(--gold)" title="Rarity ${rarityRank(card)}/10">${stars}</span>
      </div>
    </div>
    <div class="pcard-actions">
      <a class="action-btn btn-buy" href="${buy}" target="_blank" rel="noopener" onclick="event.stopPropagation()">BUY</a>
      <a class="action-btn btn-psa" href="${psa}" target="_blank" rel="noopener" onclick="event.stopPropagation()">PSA</a>
      <a class="action-btn btn-sales" href="${ebay}" target="_blank" rel="noopener" onclick="event.stopPropagation()">SALES</a>
    </div>
  </div>`;
}

function setEra(era,btn){activeEra=era;document.querySelectorAll('.era-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCards();}

/* ── MODAL ── */
function openModal(sid){
  const card=cardStore[sid];if(!card)return;
  const meta=NOTABLE[card.id]||{},img=card.images?.large||card.images?.small||'',price=getPrice(card);
  const {buy,psa,ebay,pc}=buildLinks(card);
  const badges=badgesFor(card).map(([c,l])=>`<span class="badge ${c}">${l}</span>`).join('');
  const yr=(card.set?.releaseDate||'').slice(0,4);
  const artist=card.artist?`<div style="font-family:var(--pixel);font-size:6px;color:var(--text-dim);margin-top:6px;letter-spacing:.3px;">ILLUS. ${card.artist.toUpperCase()}</div>`:'';
  const hp=card.hp?`<span style="font-family:var(--pixel);font-size:8px;color:var(--text-dim);margin-left:8px;letter-spacing:.3px;">HP ${card.hp}</span>`:'';
  document.getElementById('modal-inner').innerHTML=`
    <div class="modal-img">${img?`<img src="${img}" alt="${card.name}">`:`<div class="img-ph">?</div>`}</div>
    <div class="modal-details">
      <div class="modal-name">${card.name.toUpperCase()}${hp}</div>
      <div class="modal-set">${card.set?.name||''} · #${card.number||''} · ${yr}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin:6px 0">${badges}</div>
      ${artist}
      ${meta.note?`<div style="font-family:var(--vt);font-size:16px;color:var(--text-dim);font-style:italic;margin-top:8px;line-height:1.5;">${meta.note}</div>`:''}
      <div class="modal-sh">MARKET PRICE</div>
      <div class="modal-price-big">${price||'—'}</div>
      <div class="modal-sh">LINKS</div>
      <div class="modal-link-row">
        <a class="action-btn btn-buy" href="${buy}" target="_blank" rel="noopener">BUY ON TCGPLAYER ▶</a>
        <a class="action-btn btn-sales" href="${ebay}" target="_blank" rel="noopener">EBAY SALES</a>
        <a class="action-btn btn-sales" href="${pc}" target="_blank" rel="noopener">PRICECHARTING</a>
      </div>
      <div class="modal-sh">PSA GRADING</div>
      <div class="modal-note">LOOK UP GRADE BREAKDOWN AT <a href="${psa}" target="_blank" rel="noopener">PSA POP REPORT ▶</a>. FOR VALUES BY GRADE SEE <a href="${pc}" target="_blank" rel="noopener">PRICECHARTING</a>.</div>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModalClick(e){if(e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal-overlay').classList.remove('open');});

/* ── BUY SECTION ── */
function buildBuySection(){
  if(!currentPoke)return;
  const n=encodeURIComponent(currentPoke.name);
  document.getElementById('buy-sub').textContent=`BEST PLACES TO FIND ${currentPoke.name.toUpperCase()} CARDS`;
  document.getElementById('market-grid').innerHTML=`
    <a class="market-card" href="https://www.tcgplayer.com/search/pokemon/product?q=${n}&view=grid" target="_blank" rel="noopener"><span class="market-icon">🏪</span><div class="market-name">TCGPLAYER</div><div class="market-desc">Largest English TCG marketplace. Live prices, seller ratings, condition filtering.</div><span class="market-tag">BEST OVERALL</span></a>
    <a class="market-card" href="https://www.ebay.ca/sch/i.html?_nkw=${n}+pokemon+card&LH_Sold=1&LH_Complete=1" target="_blank" rel="noopener"><span class="market-icon">📦</span><div class="market-name">EBAY SOLD LISTINGS</div><div class="market-desc">Completed sales only — real prices paid. Best for WotC era and graded copies.</div><span class="market-tag">REAL SALE PRICES</span></a>
    <a class="market-card" href="https://www.cardmarket.com/en/Pokemon/Products/Search?searchString=${n}&language=1" target="_blank" rel="noopener"><span class="market-icon">🌍</span><div class="market-name">CARDMARKET</div><div class="market-desc">Competitive pricing. Popular in Canada and Europe.</div><span class="market-tag">GREAT PRICING</span></a>
    <a class="market-card" href="https://www.pricecharting.com/search-products?q=${n}+pokemon&type=price-guide" target="_blank" rel="noopener"><span class="market-icon">📈</span><div class="market-name">PRICECHARTING</div><div class="market-desc">Recent eBay sold prices, PSA graded values, and long-term price charts.</div><span class="market-tag">PRICE RESEARCH</span></a>
    <a class="market-card" href="https://www.psacard.com/pop/tcg-cards/156940" target="_blank" rel="noopener"><span class="market-icon">🏆</span><div class="market-name">PSA POPULATION</div><div class="market-desc">Grade breakdown for every graded copy. Essential for WotC era scarcity research.</div><span class="market-tag">GRADING DATA</span></a>
    <a class="market-card" href="https://www.pwccmarketplace.com/search?q=${n}+pokemon" target="_blank" rel="noopener"><span class="market-icon">💎</span><div class="market-name">PWCC MARKETPLACE</div><div class="market-desc">Premium graded cards. Best for PSA 9 and PSA 10 WotC holos.</div><span class="market-tag">PREMIUM GRADED</span></a>`;
  document.getElementById('buy-section').style.display='';
}

/* ── HERO ── */
function buildHero(poke){
  const tt=t=>{const cls=TYPE_CLASSES[t]||'tt-normal';return`<span class="type-tag ${cls}">${t.toUpperCase()}</span>`;};
  document.getElementById('poke-hero').innerHTML=`
    <div class="poke-hero-inner">
      <div class="poke-hero-sprite">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${poke.id}.png" alt="${poke.name}" onerror="this.style.display='none'">
      </div>
      <div class="poke-hero-text">
        <div class="hero-eyebrow">KANTO TCG · COLLECTOR'S GUIDE</div>
        <div class="hero-type-row">${tt(poke.type1)}${poke.type2?tt(poke.type2):''}</div>
        <h1>${poke.name.toUpperCase()}</h1>
        <p class="poke-hero-desc">${poke.desc}</p>
        <div class="hero-stats-row">
          <div class="hstat"><div class="hstat-val">#${String(poke.id).padStart(3,'0')}</div><div class="hstat-label">POKÉDEX</div></div>
          <div class="hstat"><div class="hstat-val">GEN I</div><div class="hstat-label">GENERATION</div></div>
          <div class="hstat"><div class="hstat-val" id="hero-count">—</div><div class="hstat-label">TOTAL PRINTS</div></div>
        </div>
      </div>
      <div class="dex-bg" aria-hidden="true">#${String(poke.id).padStart(3,'0')}</div>
    </div>`;
}

/* ── NAV ── */
function buildNav(slug){
  const nav=document.getElementById('nav-links');
  const idx=KANTO_POKEMON.findIndex(p=>p.slug===slug);
  if(idx>0){const prev=KANTO_POKEMON[idx-1];const a=document.createElement('a');a.className='nav-link';a.href=`${prev.slug}.html`;a.textContent=`◀ ${prev.name.toUpperCase()}`;nav.appendChild(a);}
  if(idx<KANTO_POKEMON.length-1){const next=KANTO_POKEMON[idx+1];const a=document.createElement('a');a.className='nav-link';a.href=`${next.slug}.html`;a.textContent=`${next.name.toUpperCase()} ▶`;nav.appendChild(a);}
}
function handleNavSearch(e,val){if(e.key!=='Enter')return;const q=val.trim().toLowerCase();const m=KANTO_POKEMON.find(p=>p.name.toLowerCase().startsWith(q)||p.slug===q.replace(/\s/g,'-'));if(m)window.location.href=`${m.slug}.html`;}

/* ── BOOT — currentSlug injected per file ── */
(async function init(){
  currentPoke=KANTO_POKEMON.find(p=>p.slug===currentSlug);
  if(!currentPoke){document.title='KANTO TCG — NOT FOUND';document.getElementById('poke-hero').innerHTML='<div class="poke-hero-inner" style="padding:48px"><p style="font-family:var(--pixel);font-size:8px;color:var(--text-dim)">NOT FOUND. <a href="index.html" style="color:var(--gb0)">RETURN HOME ▶</a></p></div>';document.getElementById('count-chip').textContent='';return;}
  document.title=`${currentPoke.name.toUpperCase()} — KANTO TCG`;
  buildHero(currentPoke);
  buildNav(currentSlug);
  await fetchAllCards(currentPoke.name);
})();
</script>
</body>
</html>
